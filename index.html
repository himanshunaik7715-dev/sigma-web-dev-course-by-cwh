<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik+Glitch&display=swap');

        body {
            background-color: black;
            color: green;
            font-family: "Rubik Glitch", system-ui;
            font-weight: 400;
            font-size: 30px;
            font-style: normal;
        }
    </style>
</head>

<body>
    <!-- Create a hacking simulator which has black background and it shows these messages with random delay of 1 to 7 seconds
    
    Initializing Hacking....
    Reading Your Files......
    Password Files Detected....
    Sending all passwords and personal files to server...
    Cleaning Up...

    these three dots must blink so that it looks like a real Terminal -->
    <div>Initializing Hacking...</div>
    <script>
        const addItem = async (item) => {
            await randomDelay();
            let div = document.createElement("div")
            div.innerHTML = item
            document.body.append(div)
        }
        const randomDelay = () => {
            return new Promise((resolve, reject) => {
                timeout = 1 + 6 * Math.random()
                setTimeout(() => {
                    resolve()
                }, timeout * 1000)
            })
        }
        async function main() {
            let t = setInterval(() => {
                let last = document.body.getElementsByTagName("div");
                last = last[last.length - 1]
                if (last.innerHTML.endsWith("...")) {
                    last.innerHTML = last.innerHTML.slice(0, last.innerHTML.length-3)
                }
                else {
                    last.innerHTML = last.innerHTML + "."
                }
            }, 100);
            let text = [
                "Initialized Hacking now reading your data",
                "Reading Your Files",
                "Password Files Detected",
                "Sending all passwords and personal files to server",
                "Cleaning Up"]

            for (const item of text) {
                await addItem(item)
            }
            await randomDelay()
            clearInterval(t)
        }
        main()
    </script>
</body>

</html>
